<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos a Proveedores</title>
    <style>
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        .form-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; gap: 15px; margin-bottom: 20px; }
        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: #2ecc71; color: white; width: 100%; }
        .btn-save:hover { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        .badge-entrada { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <a href="/productos" style="text-decoration: none; color: #3498db;">← Volver al Inventario</a>
    
    <h2>📦 Registrar Pedido a Proveedor</h2>
    
    <form action="/pedido_proveedor" method="POST">
        <div class="form-row">
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Proveedor</label>
                <select name="proveedor_id" required>
                    <option value="" disabled selected>Seleccione Proveedor</option>
                    {% for p in proveedores %}
                        <option value="{{ p.idproveedor }}">{{ p.nombre_proveedor }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Producto</label>
                <select name="producto_id" required>
                    <option value="" disabled selected>Seleccione Producto</option>
                    {% for pr in productos %}
                        <option value="{{ pr.idProductos }}">{{ pr.nombre_productos }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold;">Cantidad</label>
                <input type="number" name="cantidad" placeholder="Unidades" min="1" required>
            </div>
        </div>
        <button type="submit" class="btn-save">➕ Registrar Entrada y Actualizar Stock</button>
    </form>

    <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">

    <h3>📋 Historial de Abastecimiento</h3>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Proveedor</th>
                <th>Cantidad total stok</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for registro in historial %}
            <tr>
                <td><strong>{{ registro.nombre_producto }}</strong></td>
                <td>{{ registro.nombre_proveedor }}</td>
                <td><span style="color: #27ae60; font-weight: bold;">+ {{ registro.cantidad }}</span></td>
                <td><span class="badge-entrada">Stock Actualizado</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
